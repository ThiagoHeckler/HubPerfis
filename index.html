<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: #0D1B2A; color: #EAF0F6; font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  a { color: #2DD4BF; }
  a:hover { color: #F4A81D; }
</style>
</helmet>
<section aria-label="Hub de perfis de Thiago Heckler" style="position: relative; min-height: 100vh; width: 100%; overflow: hidden; padding: 48px 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: linear-gradient(rgba(234,240,246,0.028) 1px, transparent 1px), linear-gradient(90deg, rgba(234,240,246,0.028) 1px, transparent 1px); background-size: 44px 44px;">

  <div aria-hidden="true" style="position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 45%, rgba(45,212,191,0.06), transparent 70%); pointer-events: none;"></div>
  <div aria-hidden="true" style="position: absolute; top: -60px; left: -20px; font-family: 'JetBrains Mono', monospace; font-size: 340px; line-height: 1; color: rgba(234,240,246,0.018); pointer-events: none; user-select: none;">{</div>
  <div aria-hidden="true" style="position: absolute; bottom: -120px; right: -10px; font-family: 'JetBrains Mono', monospace; font-size: 340px; line-height: 1; color: rgba(234,240,246,0.018); pointer-events: none; user-select: none;">}</div>

  <header style="text-align: center; max-width: 640px; margin-bottom: 8px; position: relative;">
    <div style="display: inline-flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: #8DA2B5; border: 1px solid rgba(141,162,181,0.22); border-radius: 999px; padding: 6px 14px;">
      <span style="width: 6px; height: 6px; border-radius: 999px; background: #2DD4BF; box-shadow: 0 0 8px rgba(45,212,191,0.8);"></span>
      onde eu compartilho tech
    </div>
  </header>

  <!-- DESKTOP: radial hub-and-spoke -->
  <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
  <div style="width: 100%; display: flex; justify-content: center; height: {{ canvasWrapH }}px;">
  <div style="position: relative; width: 1100px; height: 760px; flex: none; transform: scale({{ canvasScale }}); transform-origin: top center;">

    <svg viewBox="0 0 1100 760" width="1100" height="760" aria-hidden="true" style="position: absolute; inset: 0; overflow: visible;">
      <line x1="550" y1="380" x2="550" y2="80"  stroke="#F4A81D" stroke-width="1.2" stroke-opacity="0.42" stroke-dasharray="2 5" stroke-linecap="round"></line>
      <line x1="550" y1="380" x2="911" y2="287" stroke="#2DD4BF" stroke-width="1.2" stroke-opacity="0.42" stroke-dasharray="2 5" stroke-linecap="round"></line>
      <line x1="550" y1="380" x2="773" y2="623" stroke="#2DD4BF" stroke-width="1.2" stroke-opacity="0.42" stroke-dasharray="2 5" stroke-linecap="round"></line>
      <line x1="550" y1="380" x2="327" y2="623" stroke="#2DD4BF" stroke-width="1.2" stroke-opacity="0.42" stroke-dasharray="2 5" stroke-linecap="round"></line>
      <line x1="550" y1="380" x2="189" y2="287" stroke="#F4A81D" stroke-width="1.2" stroke-opacity="0.42" stroke-dasharray="2 5" stroke-linecap="round"></line>
      <circle cx="550" cy="80"  r="3.5" fill="#F4A81D" fill-opacity="0.7"></circle>
      <circle cx="911" cy="287" r="3.5" fill="#2DD4BF" fill-opacity="0.7"></circle>
      <circle cx="773" cy="623" r="3.5" fill="#2DD4BF" fill-opacity="0.7"></circle>
      <circle cx="327" cy="623" r="3.5" fill="#2DD4BF" fill-opacity="0.7"></circle>
      <circle cx="189" cy="287" r="3.5" fill="#F4A81D" fill-opacity="0.7"></circle>
    </svg>

    <!-- central node -->
    <div style="position: absolute; left: 50%; top: 380px; transform: translate(-50%, -50%); width: 264px; text-align: center; background: #16293B; border: 1px solid rgba(45,212,191,0.28); border-radius: 22px; padding: 30px 24px; box-shadow: 0 0 0 6px rgba(13,27,42,0.6), 0 0 40px rgba(45,212,191,0.06);">
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 46px; font-weight: 700; letter-spacing: 0.02em; line-height: 1;">
        <span style="color: #F4A81D;">{</span><span style="color: #EAF0F6; margin: 0 4px;">TH</span><span style="color: #F4A81D;">}</span>
      </div>
      <div style="font-family: Sora, sans-serif; font-weight: 500; font-size: 21px; margin-top: 16px; color: #EAF0F6;">Thiago Heckler</div>
      <div style="font-family: Inter, sans-serif; font-size: 13.5px; margin-top: 6px; color: #8DA2B5; line-height: 1.4;">Integrações que fazem a diferença</div>
    </div>

    <sc-for list="{{ profiles }}" as="p" hint-placeholder-count="5">
      <a href="{{ p.url }}" target="_blank" rel="noopener noreferrer" aria-label="{{ p.aria }}"
         style="position: absolute; left: {{ p.left }}px; top: {{ p.top }}px; width: 256px; text-decoration: none; display: flex; gap: 14px; align-items: flex-start; background: #16293B; border: 1px solid rgba(141,162,181,0.18); border-radius: 16px; padding: 16px 18px; transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease; outline: none;"
         style-hover="transform: translateY(-4px); border-color: {{ p.accent }}; box-shadow: 0 10px 26px rgba(0,0,0,0.28), 0 0 0 1px {{ p.accent }};"
         style-focus="border-color: {{ p.accent }}; box-shadow: 0 0 0 2px #0D1B2A, 0 0 0 4px {{ p.accent }};">
        <span style="flex: none; width: 44px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; background: rgba(13,27,42,0.55); border: 1px solid {{ p.accentSoft }}; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; color: {{ p.accent }};">{{ p.mark }}</span>
        <span style="min-width: 0;">
          <span style="display: block; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #8DA2B5;">{{ p.platform }}</span>
          <span style="display: block; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; color: #2DD4BF; margin-top: 3px; word-break: break-word;">{{ p.handle }}</span>
          <span style="display: block; font-family: Inter, sans-serif; font-size: 12.5px; color: #8DA2B5; margin-top: 6px; line-height: 1.4;">{{ p.desc }}</span>
        </span>
      </a>
    </sc-for>
  </div>
  </div>
  </sc-if>

  <!-- MOBILE: stacked column -->
  <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
  <div style="width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 14px; position: relative;">
    <div style="text-align: center; background: #16293B; border: 1px solid rgba(45,212,191,0.28); border-radius: 20px; padding: 26px 20px; margin-bottom: 4px;">
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 40px; font-weight: 700; line-height: 1;">
        <span style="color: #F4A81D;">{</span><span style="color: #EAF0F6; margin: 0 4px;">TH</span><span style="color: #F4A81D;">}</span>
      </div>
      <div style="font-family: Sora, sans-serif; font-weight: 500; font-size: 20px; margin-top: 14px;">Thiago Heckler</div>
      <div style="font-family: Inter, sans-serif; font-size: 13px; margin-top: 6px; color: #8DA2B5;">Integrações que fazem a diferença</div>
    </div>

    <sc-for list="{{ profiles }}" as="p" hint-placeholder-count="5">
      <a href="{{ p.url }}" target="_blank" rel="noopener noreferrer" aria-label="{{ p.aria }}"
         style="text-decoration: none; display: flex; gap: 14px; align-items: flex-start; background: #16293B; border: 1px solid rgba(141,162,181,0.18); border-radius: 16px; padding: 16px 18px; transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease; outline: none;"
         style-hover="border-color: {{ p.accent }}; box-shadow: 0 0 0 1px {{ p.accent }};"
         style-focus="border-color: {{ p.accent }}; box-shadow: 0 0 0 2px #0D1B2A, 0 0 0 4px {{ p.accent }};">
        <span style="flex: none; width: 44px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; background: rgba(13,27,42,0.55); border: 1px solid {{ p.accentSoft }}; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; color: {{ p.accent }};">{{ p.mark }}</span>
        <span style="min-width: 0;">
          <span style="display: block; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #8DA2B5;">{{ p.platform }}</span>
          <span style="display: block; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; color: #2DD4BF; margin-top: 3px; word-break: break-word;">{{ p.handle }}</span>
          <span style="display: block; font-family: Inter, sans-serif; font-size: 12.5px; color: #8DA2B5; margin-top: 6px; line-height: 1.4;">{{ p.desc }}</span>
        </span>
      </a>
    </sc-for>
  </div>
  </sc-if>

</section>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { w: (typeof window !== 'undefined' ? window.innerWidth : 1200) };
  componentDidMount() {
    this._onResize = () => {
      if (window.innerWidth !== this.state.w) this.setState({ w: window.innerWidth });
    };
    window.addEventListener('resize', this._onResize);
  }
  componentWillUnmount() {
    if (this._onResize) window.removeEventListener('resize', this._onResize);
  }
  renderVals() {
    const AMBER = '#F4A81D', TEAL = '#2DD4BF';
    const AMBER_SOFT = 'rgba(244,168,29,0.35)', TEAL_SOFT = 'rgba(45,212,191,0.35)';
    const profiles = [
      { platform: 'LinkedIn', mark: 'in', handle: '/in/thiagoheckler', desc: 'Backend Java/Spring e domínio fiscal', url: 'https://www.linkedin.com/in/thiago-heckler/', accent: AMBER, accentSoft: AMBER_SOFT, left: 422, top: 22, aria: 'LinkedIn de Thiago Heckler — Backend Java/Spring e domínio fiscal' },
      { platform: 'GitHub', mark: 'gh', handle: '@ThiagoHeckler', desc: 'Projetos e código aberto', url: 'https://github.com/ThiagoHeckler', accent: TEAL, accentSoft: TEAL_SOFT, left: 783, top: 229, aria: 'GitHub @ThiagoHeckler — Projetos e código aberto' },
      { platform: 'Instagram', mark: 'ig', handle: '@thiago.heckler', desc: 'Notícias de tech rápidas', url: 'https://instagram.com/thiago.heckler', accent: TEAL, accentSoft: TEAL_SOFT, left: 645, top: 565, aria: 'Instagram @thiago.heckler — Notícias de tech rápidas' },
      { platform: 'TikTok', mark: 'tt', handle: '@thiago.heckler', desc: 'Notícias de tech em vídeo curto', url: 'https://tiktok.com/@thiago.heckler', accent: TEAL, accentSoft: TEAL_SOFT, left: 199, top: 565, aria: 'TikTok @thiago.heckler — Notícias de tech em vídeo curto' },
      { platform: 'Blog', mark: '//', handle: 'thiagoheckler.com.br', desc: 'Site de portfólio', url: 'https://thiagoheckler.com.br', accent: AMBER, accentSoft: AMBER_SOFT, left: 61, top: 229, aria: 'Blog thiagoheckler.com.br — Site de portfólio' },
    ];
    const w = this.state.w;
    const isMobile = w < 900;
    const scale = isMobile ? 1 : Math.min(1, (w - 48) / 1100);
    return {
      profiles, isMobile, isDesktop: !isMobile,
      canvasScale: scale,
      canvasWrapH: Math.round(760 * scale),
    };
  }
}
</script>
</body>
</html>
